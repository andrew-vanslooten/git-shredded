  "Upper Body": { bg: "#D8F3DC", text: "#2D6A4F" },
  "Lower Body": { bg: "#D6EAF8", text: "#1B6CA8" },

};

const TAG_COLORS = {
  chest:     { bg: "#FDE8D8", text: "#9C3A0D" },
  back:      { bg: "#E8D5F5", text: "#6B21A8" },
  shoulders: { bg: "#FEF9C3", text: "#854D0E" },
  arms:      { bg: "#FCE7F3", text: "#9D174D" },
  legs:      { bg: "#D6EAF8", text: "#1B6CA8" },

};

// ── State ──────────────────────────────────────────────────────────────────────
let activeDay = 0;
let expandedMap = {};   // key: "dayIndex-exIndex" → bool
let filterTag = null;

function toggleExpand(dayIdx, exIdx) {
  const key = `${dayIdx}-${exIdx}`;
  expandedMap[key] = !expandedMap[key];
  renderContent();
}

function setDay(idx) {
  activeDay = idx;
  filterTag = null;
  expandedMap = {};
  renderNav();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setFilter(tag) {
  filterTag = (filterTag === tag) ? null : tag;
  renderContent();
}

// ── Render nav ─────────────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('dayNav');
  nav.innerHTML = PLAN.map((d, i) => {
    const isActive = i === activeDay;
    const parts = d.day.split(' ');
    return `
      <button class="day-btn${isActive ? ' active' : ''}"
        style="border-bottom-color: ${isActive ? d.color : 'transparent'}"
        onclick="setDay(${i})">
        <div class="day-btn-icon">${d.icon}</div>
        <div class="day-btn-label" style="color: ${isActive ? d.color : '#777'}">${d.label.split(' ')[0].toUpperCase()}</div>
        <div class="day-btn-date">${parts[1]} ${parts[2]}</div>
      </button>`;
  }).join('');
}

// ── Render main content ────────────────────────────────────────────────────────
function renderContent() {
  const d = PLAN[activeDay];
  const tide = TIDES[d.day];
  const badge = TYPE_BADGE[d.type] || { bg: "#EAF0F6", text: "#3D4F5C" };
  const tideClass = tide.morning_status === "LOW" ? "tide-low" : tide.morning_status === "MEDIUM" ? "tide-medium" : "tide-high";
  const tidePillBg = tide.morning_status === "LOW" ? "#AED6F1" : tide.morning_status === "MEDIUM" ? "#A9DFBF" : "#FAD7A0";

  const allTags = [...new Set(d.exercises.map(e => e.tag))];
  const filtered = filterTag ? d.exercises.filter(e => e.tag === filterTag) : d.exercises;

  // Tag filter buttons
  const tagBtns = [
    `<button class="tag-btn" style="background:${!filterTag ? '#1a3a2a' : '#E8E2D8'}; color:${!filterTag ? 'white' : '#555'}" onclick="setFilter(null)">All</button>`,
    ...allTags.map(tag => {
      const tc = TAG_COLORS[tag] || { bg: '#eee', text: '#333' };
      const isActive = filterTag === tag;
      return `<button class="tag-btn" style="background:${isActive ? tc.text : tc.bg}; color:${isActive ? 'white' : tc.text}" onclick="setFilter('${tag}')">${tag}</button>`;
    })
  ].join('');

  // Exercise rows
  const exerciseRows = filtered.map(ex => {
    const realIdx = d.exercises.indexOf(ex);
    const key = `${activeDay}-${realIdx}`;
    const isOpen = !!expandedMap[key];
    const isSub = ex.name.startsWith('  ↳');
    const tc = TAG_COLORS[ex.tag] || { bg: '#eee', text: '#333' };
    const tagPill = !isSub ? `<span class="exercise-tag-pill" style="background:${tc.bg}; color:${tc.text}">${ex.tag}</span>` : '';
    const notes = isOpen ? `<div class="exercise-notes"><div class="exercise-notes-inner">💡 ${ex.notes}</div></div>` : '';
    return `
      <div class="exercise-card">
        <button class="exercise-btn" onclick="toggleExpand(${activeDay}, ${realIdx})">
          <div style="flex:1">
            <div class="exercise-name-row">
              <span class="exercise-name${isSub ? ' sub' : ''}">${ex.name}</span>
              ${tagPill}
            </div>
            <div class="exercise-sets">${ex.sets} sets · ${ex.reps}</div>
          </div>
          <div class="exercise-right">
            <span class="exercise-equip">${ex.equipment}</span>
            <span class="exercise-chevron">${isOpen ? '▲' : '▼'}</span>
          </div>
        </button>
        ${notes}
      </div>`;
  }).join('');

  // Week overview rows
  const weekRows = PLAN.map((wd, i) => {
    const wt = TIDES[wd.day];
    const pillBg = wt.morning_status === "LOW" ? "#AED6F1" : wt.morning_status === "MEDIUM" ? "#A9DFBF" : "#FAD7A0";
    return `
      <button class="week-item${i === activeDay ? ' active' : ''}" onclick="setDay(${i})">
        <span class="week-item-icon">${wd.icon}</span>
        <div class="week-item-text">
          <div class="week-item-name">${wd.label} · ${wd.type}</div>
          <div class="week-item-loc">${wd.location}</div>
        </div>
        <span class="tide-pill" style="background:${pillBg}">${wt.morning_status}</span>
      </button>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <!-- Day header -->
    <div class="day-header">
      <div>
        <div class="day-title">${d.label} — <span style="color:${d.color}">${d.type}</span></div>
        <div class="day-meta">📍 ${d.location} &nbsp;·&nbsp; ⏰ ${d.target_time}</div>
      </div>
      <span class="type-badge" style="background:${badge.bg}; color:${badge.text}">${d.type}</span>
    </div>

    <!-- Tide card -->
    <div class="tide-card ${tideClass}">
      <div class="card-label">🌊 Tide · ${d.day}</div>
      <div class="tide-times"><strong>AM Low:</strong> ${tide.am_low} &nbsp;|&nbsp; <strong>AM High:</strong> ${tide.am_high}</div>
      <div class="tide-note">${tide.morning_note}</div>
    </div>

    <!-- Warm-up -->
    <div class="card">
      <div class="card-label">Warm-Up</div>
      <div class="card-text">${d.warmup}</div>
    </div>

    <!-- Tag filters -->
    <div class="tag-filters">${tagBtns}</div>
    <div class="filter-count">${filtered.length} exercise${filtered.length !== 1 ? 's' : ''}${filterTag ? ' · ' + filterTag : ''}</div>

    <!-- Exercises -->
    <div>${exerciseRows}</div>

    <!-- Cool-down -->
    <div class="card">
      <div class="card-label">Cool-Down</div>
      <div class="card-text">${d.cooldown}</div>
    </div>

    <!-- Week overview -->
    <div class="week-overview">
      <div class="week-label">Week at a Glance</div>
      <div class="week-list">${weekRows}</div>
    </div>

    <!-- Notes -->
    <div class="notes-card">
      <div class="card-label">Notes &amp; Tips</div>
      <ul>
        <li><strong>Beach days (Tue, Thu, Fri):</strong> Sandbag only — no dumbbells needed or brought.</li>
        <li><strong>Cottage days (Sun, Mon, Wed):</strong> Full kit — sandbag + both sets of dumbbells.</li>
        <li>Bring a shirt or towel to pad concrete for floor presses on Monday.</li>
        <li>Scale sandbag to 75 lbs for overhead; go 100–125 lbs for squats and deadlifts.</li>
        <li>Daily beach walk is in addition to the structured workout.</li>
        <li>Start by 7 AM every day — NC summer heat builds fast. Bring water.</li>
        <li>Tap any exercise to expand coaching notes. Use tag filters to focus on a muscle group.</li>
      </ul>
    </div>
  `;
}

          </div>
          <div class="tide-cell is-high">
            <div class="tide-cell-label">AM High</div>
            <div class="tide-cell-time">${d.am_high.time}</div>
            <div class="tide-cell-height">${d.am_high.height}</div>
          </div>
          <div class="tide-cell is-low">
            <div class="tide-cell-label">PM Low</div>
            <div class="tide-cell-time">${d.pm_low.time}</div>
            <div class="tide-cell-height">${d.pm_low.height}</div>
          </div>
          <div class="tide-cell is-high">
            <div class="tide-cell-label">PM High</div>
            <div class="tide-cell-time">${d.pm_high.time}</div>
            <div class="tide-cell-height">${d.pm_high.height}</div>
          </div>
        </div>
        <div class="tide-morning-note">
          <span style="display:inline-block; background:${sbg}; color:${stxt}; font-style:normal; font-weight:700;
            font-size:10px; text-transform:uppercase; letter-spacing:0.8px; padding:2px 8px; border-radius:10px; margin-right:7px;">
            ${d.statusLabel}
          </span>${d.note}
        </div>
      </div>`;
  }).join('');

  document.getElementById('tidesSection').innerHTML = `
    <div class="tide-page">
      <div class="tide-page-title">🌊 Tide Calendar</div>
      <div class="tide-page-sub">Sunset Beach Pier · NOAA Station #8659897 · All times EDT · Heights in feet (MLLW)</div>
      ${cards}
      <div class="tide-source">
        Tide heights are low tide (green) and high tide (blue).<br>
        Source: NOAA / US Harbors · Predictions accurate to ±10 min / ±0.5 ft.<br>
        🟢 Low = widest beach · 🟡 Medium = decent sand · 🔴 High = beach mostly covered
      </div>
    </div>`;
}

// ── Init ───────────────────────────────────────────────────────────────────────
renderNav();
renderContent();
renderTidePage();

</script>
